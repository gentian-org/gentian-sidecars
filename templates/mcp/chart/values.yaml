image:
  repository: ghcr.io/gentian-org/CHANGEME-mcp # TODO
  tag: "0.1.0"
  pullPolicy: IfNotPresent

port: 8765

# TODO: rename/add whatever this sidecar's server.py actually reads to
# reach its upstream app and authenticate. Set the real value via the
# AppProfile's spec.sidecars[].extraValues, not a chart-level default --
# see README.md "Wiring into an AppProfile".
upstreamBaseUrl: "http://CHANGEME"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
